# 사내 단일 서버 배포. `docker compose up -d --build` → http://<host>:8000
# 데이터(db·이미지·산출물·프로젝트)는 named volume 으로 영속 (Windows/Mac/Linux 동일).
# PPTX 는 웹 UI에서 다운로드하므로 호스트 파일 접근 불필요.
services:
  web:
    build: .
    image: brandx-qoo10:latest
    container_name: brandx-qoo10
    ports:
      - "8000:8000"
    env_file:
      - .env                       # ANTHROPIC_API_KEY (AI 서사·디자인 비전)
    environment:
      - QOO10_DB=/app/data/qoo10.db
    volumes:
      - qoo10_data:/app/data              # 수집 DB
      - qoo10_images:/app/images          # 캡처·배너
      - qoo10_out:/app/out                # 생성 PPTX·차트·비전메타
      - qoo10_projects:/app/web/projects  # 검수 프로젝트 spec
    restart: unless-stopped

volumes:
  qoo10_data:
  qoo10_images:
  qoo10_out:
  qoo10_projects:

# 사용: 브라우저에서 http://<서버IP>:8000 → 자사1+경쟁1~3 URL 입력 → 자동 수집·분석·보고서.
# (별도 수집 CLI 불필요 — 웹에서 라이브 수집)
